# ============================================================
# STATIC HTML DEPLOY — GitHub Actions
# Place at: .github/workflows/deploy.yml
#
# Deploys vanilla HTML/CSS/JS website na Hetzner VPS via rsync
#
# GitHub Secrets potrebni:
#   SSH_PRIVATE_KEY  — private key za server
#   SSH_HOST         — IP adresa servera (npr. 157.180.67.68)
#   SSH_USER         — SSH korisnik (npr. root)
#   DEPLOY_PATH      — path na serveru (npr. /var/www/my-site/html)
# ============================================================

name: Deploy Static Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='node_modules' \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Reload nginx
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "nginx -t && systemctl reload nginx"

      - name: Verify deploy
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "ls -la ${{ secrets.DEPLOY_PATH }}/"
