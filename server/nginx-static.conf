# ============================================================
# NGINX CONFIG — Static HTML Website
# Kopirati u: /etc/nginx/sites-available/SITE-NAME
# Aktivirati: ln -s /etc/nginx/sites-available/SITE-NAME /etc/nginx/sites-enabled/
#
# Zamijeniti:
#   DOMAIN.COM  → tvoja domena (npr. veselko.at)
#   SITE-NAME   → naziv sajta (npr. veselko)
# ============================================================

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN.COM www.DOMAIN.COM;
    return 301 https://$host$request_uri;
}

# HTTPS main server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name DOMAIN.COM www.DOMAIN.COM;

    root /var/www/SITE-NAME/html;
    index index.html;

    # SSL — Let's Encrypt (Certbot popuni automatski)
    ssl_certificate     /etc/letsencrypt/live/DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN.COM/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

    # Gzip kompresija
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Cache za statičke resurse
    location ~* \.(jpg|jpeg|webp|png|svg|ico|woff2|woff|gif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # HTML — no-cache (uvijek svježa verzija)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Main routing
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Custom 404
    error_page 404 /404.html;

    # Blokirati pristup skrivenim fajlovima
    location ~ /\. {
        deny all;
    }
}
